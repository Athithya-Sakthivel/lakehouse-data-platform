name: Build and Push Spark Image

on:
  push:
    branches:
      - main
    paths:
      - src/infra/spark/**
  workflow_dispatch:
    inputs:
      spark_version:
        description: "Spark version"
        required: true
        default: "4.0.2"
      registry_type:
        description: "Target registry"
        required: true
        default: "ghcr"
        type: choice
        options:
          - ghcr
          - ecr
      ecr_repo:
        description: "ECR repo (full registry/repo), required if registry_type=ecr (example: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/myrepo)"
        required: false
        default: ""
      aws_region:
        description: "AWS region for ECR"
        required: false
        default: "ap-south-1"
      environment:
        description: "Deployment environment (used to set job environment)"
        required: false
        default: "staging"
      force_rebuild:
        description: "Force build/push even if an identical image exists"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: spark-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    env:
      SPARK_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.spark_version || '4.0.2' }}
      REGISTRY_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.registry_type || 'ghcr' }}
      ECR_REPO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ecr_repo || '' }}
      AWS_REGION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aws_region || 'ap-south-1' }}
      GITHUB_USER: ${{ github.repository_owner }}
      IMAGE_REPO: spark
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.spark_version || '4.0.2' }}
      PLATFORMS: linux/amd64,linux/arm64
      TRIVY_IMAGE: aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa
      TRIVY_SEVERITY: CRITICAL
      FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebuild || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Prepare derived env (export to GITHUB_ENV)
        run: |
          echo "BUILD_CONTEXT=src/infra/spark" >> $GITHUB_ENV
          echo "DOCKERFILE_PATH=src/infra/spark/Dockerfile" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Configure AWS (for ECR)
        if: ${{ env.REGISTRY_TYPE == 'ecr' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run build script
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_PAT }}
          SPARK_VERSION: ${{ env.SPARK_VERSION }}
          GITHUB_USER: ${{ env.GITHUB_USER }}
          REGISTRY_TYPE: ${{ env.REGISTRY_TYPE }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          PLATFORMS: ${{ env.PLATFORMS }}
          TRIVY_IMAGE: ${{ env.TRIVY_IMAGE }}
          TRIVY_SEVERITY: ${{ env.TRIVY_SEVERITY }}
          ECR_REPO: ${{ env.ECR_REPO }}
          AWS_REGION: ${{ env.AWS_REGION }}
          FORCE_REBUILD: ${{ env.FORCE_REBUILD }}
        run: bash src/infra/spark/CI.sh