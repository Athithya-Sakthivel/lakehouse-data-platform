apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: default
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie

  storage:
    storageClass: default-storage-class
    size: 5Gi

  walStorage:
    storageClass: default-storage-class
    size: 2Gi

  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "200"
      wal_compression: "on"
      effective_cache_size: "1GB"

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Use both affinity and topologySpreadConstraints as supported by the CRD
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              cnpg.io/cluster: postgres-cluster
          topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        cnpg.io/cluster: postgres-cluster

  bootstrap:
    initdb:
      postInitSQL:
        - CREATE DATABASE flyte_admin;
        - CREATE DATABASE flyte_propeller;
        - CREATE DATABASE mlflow;
        - CREATE DATABASE rising_wave;
